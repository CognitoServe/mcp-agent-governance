name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize Database Schema
        env:
          PGPASSWORD: changeme
        run: |
          # Install postgresql-client to use psql
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql -h localhost -U postgres -d test_db -f app/schema.sql

      - name: Run Pytest
        env:
          DATABASE_URL: postgresql://postgres:changeme@localhost:5432/test_db
          TEST_DATABASE_URL: postgresql://postgres:changeme@localhost:5432/test_db
        run: |
          pytest -v

      - name: Run Adversarial Scorecard
        env:
          DATABASE_URL: postgresql://postgres:changeme@localhost:5432/test_db
        run: |
          python scripts/adversarial_scorecard.py
