<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Governance Ledger</title>
<style>
  :root {
    --bg: #0F1115;
    --panel: #171A20;
    --border: #262B33;
    --text: #E4E4E1;
    --muted: #8A8F98;
    --money: #E0A63C;
    --allowed: #4CAF7D;
    --denied: #D66A5C;
    --revoked: #6B7280;
    --chain: #5B8DEF;
    --chain-broken: #D66A5C;
    
    --font-mono: 'JetBrains Mono', 'IBM Plex Mono', 'Menlo', 'Consolas', monospace;
    --font-sans: 'IBM Plex Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    margin: 0;
    padding: 0;
    line-height: 1.5;
  }

  .mono { font-family: var(--font-mono); }
  .money { color: var(--money); }
  .muted { color: var(--muted); }
  .allowed { color: var(--allowed); }
  .denied { color: var(--denied); }

  /* Top Status Strip */
  #status-strip {
    background-color: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    font-size: 0.85rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .container {
    padding: 24px;
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .col { display: flex; flex-direction: column; gap: 24px; }
  
  h2 {
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin: 0 0 12px 0;
    font-weight: 600;
  }

  /* Agent Ledger */
  .ledger-row {
    background-color: var(--panel);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .ledger-info {
    display: flex;
    align-items: center;
    gap: 16px;
    flex: 1;
  }

  .status-pill {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .status-pill.active { background-color: var(--allowed); }
  .status-pill.revoked { background-color: var(--revoked); }

  .agent-name {
    font-weight: 600;
    min-width: 180px;
  }

  /* Cap Utilization Bar */
  .cap-container {
    flex: 1;
    margin: 0 24px;
    max-width: 300px;
  }
  .cap-bar-bg {
    height: 4px;
    background-color: var(--border);
    width: 100%;
    position: relative;
  }
  .cap-bar-fill {
    height: 100%;
    background-color: var(--money);
    position: absolute;
    left: 0;
    top: 0;
    transition: width 0.3s;
  }
  .cap-bar-fill.danger {
    background-color: var(--denied);
  }
  
  .amounts {
    display: flex;
    gap: 16px;
    font-size: 0.9rem;
    min-width: 200px;
  }
  
  /* Toggle Switch */
  .toggle-switch {
    display: inline-block;
    width: 44px;
    height: 24px;
    background-color: var(--revoked);
    border-radius: 12px;
    position: relative;
    cursor: pointer;
    border: 2px solid var(--border);
  }
  .toggle-switch.active {
    background-color: var(--allowed);
  }
  .toggle-knob {
    width: 18px;
    height: 18px;
    background-color: #fff;
    border-radius: 50%;
    position: absolute;
    top: 1px;
    left: 2px;
    transition: left 0.2s;
  }
  .toggle-switch.active .toggle-knob {
    left: 20px;
  }

  /* Audit Feed */
  .audit-feed {
    background-color: var(--panel);
    border: 1px solid var(--border);
    padding: 16px;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    height: 400px;
    overflow-y: auto;
  }
  .audit-row {
    margin-bottom: 6px;
    display: flex;
    gap: 12px;
  }
  .decision-badge {
    padding: 2px 6px;
    border-radius: 2px;
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
  }
  .decision-badge.allowed { background-color: rgba(76, 175, 125, 0.1); color: var(--allowed); border: 1px solid var(--allowed); }
  .decision-badge.denied { background-color: rgba(214, 106, 92, 0.1); color: var(--denied); border: 1px solid var(--denied); }

  /* Chain Integrity */
  .chain-panel {
    background-color: var(--panel);
    border: 1px solid var(--border);
    padding: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
  }
  .chain-link {
    width: 24px;
    height: 12px;
    border-radius: 6px;
    background-color: var(--chain);
    position: relative;
  }
  .chain-connector {
    width: 8px;
    height: 2px;
    background-color: var(--chain);
  }
  .chain-link.broken {
    background-color: var(--chain-broken);
  }
  .chain-connector.broken {
    background-color: transparent; /* visually disconnected */
  }

  /* Scorecard */
  .scorecard-panel {
    background-color: var(--panel);
    border: 1px solid var(--border);
    padding: 16px;
    font-size: 0.85rem;
  }
  .score-item {
    display: flex;
    gap: 12px;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .score-item:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }
  .score-status {
    font-weight: 600;
    width: 70px;
  }
  .score-status.blocked { color: var(--allowed); }
  .score-status.failed { color: var(--denied); }
  
  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<div id="status-strip">
  <div id="status-left">
    <span class="mono" id="val-total-agents">-</span> agents · 
    <span class="mono" id="val-revoked-agents">-</span> revoked · 
    chain integrity: <span class="mono" id="val-chain-integrity">-</span>
  </div>
  <div id="status-right" class="muted">
    last checked <span class="mono" id="val-last-checked">0</span>s ago
  </div>
</div>

<div class="container">
  <div class="col">
    <div>
      <h2>Agent Ledger</h2>
      <div id="ledger-container"></div>
    </div>
    <div>
      <h2>Live Audit Feed</h2>
      <div class="audit-feed" id="audit-feed-container"></div>
    </div>
  </div>
  
  <div class="col">
    <div>
      <h2>Chain Integrity</h2>
      <div class="chain-panel" id="chain-container"></div>
    </div>
    <div>
      <h2>Security Posture</h2>
      <div class="scorecard-panel" id="scorecard-container">
        <div class="muted">Loading scorecard...</div>
      </div>
    </div>
  </div>
</div>

<script>
  let lastFetchTime = Date.now();
  
  function formatMoney(val) {
    return '$' + parseFloat(val).toFixed(2);
  }
  
  function formatHash(hash) {
    if (!hash || hash.length < 12) return hash;
    return hash.substring(0, 8) + '…' + hash.substring(hash.length - 4);
  }
  
  function formatTime(isoStr) {
    const d = new Date(isoStr);
    return d.toISOString().replace('T', ' ').substring(0, 23);
  }

  async function toggleAgent(agentId, currentStatus) {
    const action = currentStatus === 'active' ? 'revoke' : 'activate';
    const message = action === 'revoke' 
      ? `WARNING: You are about to revoke agent ${agentId}. This will immediately cut off its access. Continue?`
      : `Activate agent ${agentId}?`;
      
    if (confirm(message)) {
      try {
        const res = await fetch(`/api/agents/${agentId}/${action}`, { method: 'POST' });
        if (res.ok) fetchAll();
      } catch (e) {
        console.error(e);
      }
    }
  }

  async function fetchStatus() {
    const res = await fetch('/api/status');
    const data = await res.json();
    
    document.getElementById('val-total-agents').textContent = data.total_agents;
    document.getElementById('val-revoked-agents').textContent = data.total_revoked;
    
    const chainSpan = document.getElementById('val-chain-integrity');
    if (data.chain_integrity) {
      chainSpan.innerHTML = '<span class="allowed">[✓ verified]</span>';
    } else {
      chainSpan.innerHTML = `<span class="denied">[✗ BROKEN at row ${data.broken_at_row}]</span>`;
    }
  }

  async function fetchAgents() {
    const res = await fetch('/api/agents');
    const data = await res.json();
    
    const container = document.getElementById('ledger-container');
    container.innerHTML = '';
    
    data.forEach(agent => {
      const cap = parseFloat(agent.cap);
      const spent = parseFloat(agent.spent);
      const reserved = parseFloat(agent.reserved);
      const utilized = spent + reserved;
      let ratio = 0;
      if (cap > 0) ratio = (utilized / cap) * 100;
      ratio = Math.min(ratio, 100);
      
      const isDanger = ratio > 90;
      
      const row = document.createElement('div');
      row.className = 'ledger-row';
      
      row.innerHTML = `
        <div class="ledger-info">
          <div class="status-pill ${agent.status}"></div>
          <div class="agent-name">${agent.name} <span class="muted mono" style="font-size:0.75rem;">${agent.id}</span></div>
          <div class="cap-container">
            <div class="cap-bar-bg">
              <div class="cap-bar-fill ${isDanger ? 'danger' : ''}" style="width: ${ratio}%"></div>
            </div>
          </div>
          <div class="amounts mono">
            <span class="muted">u:</span><span class="money">${formatMoney(utilized)}</span> <span class="muted">/</span> <span class="money">${formatMoney(cap)}</span>
          </div>
        </div>
        <div class="toggle-switch ${agent.status === 'active' ? 'active' : ''}" 
             onclick="toggleAgent('${agent.id}', '${agent.status}')"
             title="Toggle agent status">
          <div class="toggle-knob"></div>
        </div>
      `;
      
      container.appendChild(row);
    });
  }

  async function fetchAudit() {
    const res = await fetch('/api/audit');
    const data = await res.json();
    
    // Audit feed
    const feed = document.getElementById('audit-feed-container');
    feed.innerHTML = '';
    
    data.entries.forEach(entry => {
      const row = document.createElement('div');
      row.className = 'audit-row';
      row.innerHTML = `
        <span class="muted">[${formatTime(entry.ts)}]</span>
        <span>${entry.agent_id}</span>
        <span class="muted">·</span>
        <span>${entry.tool_name}</span>
        <span class="muted">·</span>
        <span class="decision-badge ${entry.decision}">${entry.decision}</span>
        <span class="muted">·</span>
        <span>${entry.reason}</span>
      `;
      feed.appendChild(row);
    });
    
    // Chain integrity panel
    const chainContainer = document.getElementById('chain-container');
    chainContainer.innerHTML = '';
    
    // Reverse entries to show older first, or just show last N
    const chainEntries = [...data.entries].reverse().slice(-50);
    
    for (let i = 0; i < chainEntries.length; i++) {
      const entry = chainEntries[i];
      const isBroken = data.broken_links.includes(entry.id);
      
      const link = document.createElement('div');
      link.className = `chain-link ${isBroken ? 'broken' : ''}`;
      link.title = `Row ID: ${entry.id}\\nAgent: ${entry.agent_id}\\nHash: ${formatHash(entry.row_hash)}`;
      chainContainer.appendChild(link);
      
      if (i < chainEntries.length - 1) {
        const nextIsBroken = data.broken_links.includes(chainEntries[i+1].id);
        const conn = document.createElement('div');
        conn.className = `chain-connector ${(isBroken || nextIsBroken) ? 'broken' : ''}`;
        chainContainer.appendChild(conn);
      }
    }
  }

  async function fetchScorecard() {
    try {
      const res = await fetch('/api/scorecard');
      const data = await res.json();
      
      const container = document.getElementById('scorecard-container');
      container.innerHTML = '';
      
      if (data.length === 0) {
        container.innerHTML = '<div class="muted">Scorecard data unavailable. Run tests to populate.</div>';
        return;
      }
      
      data.forEach(item => {
        const row = document.createElement('div');
        row.className = 'score-item';
        row.innerHTML = `
          <div class="score-status ${item.status.toLowerCase()}">${item.status}</div>
          <div>
            <div class="mono" style="margin-bottom:2px;">${item.name}</div>
            <div class="muted">${item.message}</div>
          </div>
        `;
        container.appendChild(row);
      });
    } catch (e) {
      console.error(e);
    }
  }

  async function fetchAll() {
    lastFetchTime = Date.now();
    await Promise.all([
      fetchStatus(),
      fetchAgents(),
      fetchAudit()
    ]);
  }

  // Initial load
  fetchAll();
  // Scorecard is heavy, load once initially
  fetchScorecard();

  // Polling
  setInterval(fetchAll, 5000);
  
  // Timer update
  setInterval(() => {
    const seconds = Math.floor((Date.now() - lastFetchTime) / 1000);
    document.getElementById('val-last-checked').textContent = seconds;
  }, 1000);

</script>
</body>
</html>
